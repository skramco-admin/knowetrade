services:
  - type: web
    name: knowetrade-api
    runtime: python
    plan: starter
    buildCommand: pip install -r apps/api/requirements.txt
    startCommand: uvicorn apps.api.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: LOG_LEVEL
        value: INFO

  - type: worker
    name: knowetrade-worker
    runtime: python
    plan: starter
    buildCommand: pip install -r apps/worker/requirements.txt
    # Placeholder: replace with your long-running worker entrypoint.
    startCommand: python -m apps.worker.main
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_API_SECRET
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: ALPACA_BASE_URL
        value: https://paper-api.alpaca.markets
      - key: ALPACA_DATA_BASE_URL
        value: https://data.alpaca.markets
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: APP_MODE
        value: paper
      - key: TRADING_ENABLED
        value: "true"
      - key: ENABLE_ORDER_SUBMISSION
        value: "false"
      - key: MAX_OPEN_POSITIONS
        value: "5"
      - key: MAX_POSITION_PCT
        value: "0.20"
      - key: DRY_RUN
        value: "false"
      - key: WORKER_JOB_NAME
        value: daily_summary
      - key: WORKER_POLL_SECONDS
        value: "3600"

  - type: cron
    name: knowetrade-premarket
    runtime: python
    plan: starter
    schedule: "30 13 * * 1-5"
    buildCommand: pip install -r apps/worker/requirements.txt
    startCommand: python -c "from apps.worker.main import run_premarket_health_check_job; run_premarket_health_check_job()"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_API_SECRET
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: ALPACA_BASE_URL
        value: https://paper-api.alpaca.markets
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: APP_MODE
        value: paper
      - key: TRADING_ENABLED
        value: "true"
      - key: ENABLE_ORDER_SUBMISSION
        value: "false"
      - key: WORKER_JOB_NAME
        value: premarket_health_check

  - type: cron
    name: knowetrade-postclose
    runtime: python
    plan: starter
    schedule: "30 20 * * 1-5"
    buildCommand: pip install -r apps/worker/requirements.txt
    startCommand: python -c "from apps.worker.main import run_postclose_workflow_job; run_postclose_workflow_job()"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_API_SECRET
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: ALPACA_BASE_URL
        value: https://paper-api.alpaca.markets
      - key: ALPACA_DATA_BASE_URL
        value: https://data.alpaca.markets
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: APP_MODE
        value: paper
      - key: TRADING_ENABLED
        value: "true"
      - key: ENABLE_ORDER_SUBMISSION
        value: "false"
      - key: WORKER_JOB_NAME
        value: daily_postclose_workflow

  - type: cron
    name: knowetrade-order-submit
    runtime: python
    plan: starter
    schedule: "40 20 * * 1-5"
    buildCommand: pip install -r apps/worker/requirements.txt
    startCommand: python -c "from apps.worker.main import run_paper_order_execution_job; run_paper_order_execution_job()"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_API_SECRET
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: ALPACA_BASE_URL
        value: https://paper-api.alpaca.markets
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: APP_MODE
        value: paper
      - key: TRADING_ENABLED
        value: "true"
      - key: ENABLE_ORDER_SUBMISSION
        sync: false
      - key: WORKER_JOB_NAME
        value: paper_order_execution

  - type: cron
    name: knowetrade-reconcile
    runtime: python
    plan: starter
    schedule: "00 21 * * 1-5"
    buildCommand: pip install -r apps/worker/requirements.txt
    startCommand: python -c "from apps.worker.main import run_reconciliation_job; run_reconciliation_job()"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_API_SECRET
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: ALPACA_BASE_URL
        value: https://paper-api.alpaca.markets
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: APP_MODE
        value: paper
      - key: TRADING_ENABLED
        value: "true"
      - key: ENABLE_ORDER_SUBMISSION
        value: "false"
      - key: WORKER_JOB_NAME
        value: daily_reconciliation

  - type: cron
    name: knowetrade-daily-summary
    runtime: python
    plan: starter
    schedule: "15 21 * * 1-5"
    buildCommand: pip install -r apps/worker/requirements.txt
    startCommand: python -c "from apps.worker.main import run_daily_summary_job; run_daily_summary_job()"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: APP_MODE
        value: paper
      - key: WORKER_JOB_NAME
        value: daily_summary
