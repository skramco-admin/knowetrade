[build]
  base = "apps/web"
  command = "npm ci --include=optional && npm install @rollup/rollup-linux-x64-gnu --no-save && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20.17.0"
  VITE_API_BASE_URL = "/api"
  NPM_FLAGS = "--include=optional"
  NPM_CONFIG_INCLUDE = "optional"

[[redirects]]
  from = "/api/*"
  to = "https://knowetrade-api.onrender.com/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
